<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои задачи</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Список задач</h1>
    <input type="text" id="taskInput" placeholder="Введите задачу">
    <button onclick="addTask()">Добавить</button>
    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value;

    if(taskText === "") return;

    let li = document.createElement("li");
    li.textContent = taskText;

    document.getElementById("taskList").appendChild(li);
    input.value = "";
}
</script>

</body>
</html>
